<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>COMMA HOUSE / Footer</title>
  <style>
    /* Reset & 기본 스타일 */
    * {
      padding: 0;
      margin: 0;
      box-sizing: border-box;
      font-family: 'Arial', sans-serif;
    }
    html, body {
      height: 100%;
      background-color: rgb(244, 241, 237);
    }
    a {
      text-decoration: none;
      color: inherit;
    }

    /* 푸터 */
    footer {
      background: #31422e;
      color: white;
      padding: 3rem 0 1rem;
      font-size: 14px;
      line-height: 1.5;
    }
    .container {
      max-width: 1200px;
      margin: 0 auto;
      padding: 0 20px;
    }
    .footer-content {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
      gap: 2rem;
      margin-bottom: 2rem;
    }
    .footer-section h3 {
      margin-bottom: 1rem;
      color: #ffffff;
      font-weight: 600;
      border-bottom: 2px solid #557a3f;
      padding-bottom: 6px;
    }
    .footer-section ul {
      list-style: none;
      padding: 0;
    }
    .footer-section ul li {
      margin-bottom: 0.5rem;
    }
    .footer-section ul li a {
      color: #ccc;
      transition: color 0.3s;
    }
    .footer-section ul li a:hover {
      color: white;
    }
    .footer-bottom {
      text-align: center;
      padding-top: 2rem;
      border-top: 1px solid #555;
      color: #ccc;
      font-size: 13px;
    }

    /* 반응형 간단 처리 */
    @media (max-width: 600px) {
      .footer-content {
        grid-template-columns: 1fr 1fr;
      }
    }
    @media (max-width: 400px) {
      .footer-content {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <footer>
    <div class="container">
      <div class="footer-content">
        <div class="footer-section">
          <h3>StayHere</h3>
          <ul>
            <li><a href="#about">회사소개</a></li>
            <li><a href="#careers">채용정보</a></li>
            <li><a href="#press">보도자료</a></li>
            <li><a href="#blog">블로그</a></li>
          </ul>
        </div>
        <div class="footer-section">
          <h3>고객지원</h3>
          <ul>
            <li><a href="#help">도움말</a></li>
            <li><a href="#contact">문의하기</a></li>
            <li><a href="#cancel">취소정책</a></li>
            <li><a href="#safety">안전정보</a></li>
          </ul>
        </div>
        <div class="footer-section">
          <h3>호스트</h3>
          <ul>
            <li><a href="#host">숙소 등록하기</a></li>
            <li><a href="#host-guide">호스트 가이드</a></li>
            <li><a href="#resources">리소스 센터</a></li>
            <li><a href="#community">커뮤니티</a></li>
          </ul>
        </div>
        <div class="footer-section">
          <h3>정책</h3>
          <ul>
            <li><a href="#terms">이용약관</a></li>
            <li><a href="#privacy">개인정보처리방침</a></li>
            <li><a href="#cookie">쿠키정책</a></li>
            <li><a href="#accessibility">접근성</a></li>
          </ul>
        </div>
      </div>
      <div class="footer-bottom">
        <p>&copy; 2024 StayHere. All rights reserved.</p>
      </div>
    </div>
  </footer>
</body>
</html>
