<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Log in to Comma House!</title>
    <style>
    
    *{
                padding:0px; 
                margin:0px; 
                box-sizing:border-box; 
                letter-spacing: 2px;
            }
            body{
              background-color: rgb(244, 241, 237);
              width:100%;
              height:100%;
              display:block;
              
            }
            a{
                text-decoration:none;
                color:#1f1f1f;
            }
            /*헤더*/
            .header1{
                position:fixed;
                top:0;
                left:0;
                width:100%;
                height: 60px;
                z-index: 100;
                background-color: #31422e;
                
            }
            .header2{
              visibility: hidden;
              width: 100%;
              height: 60px;
              
            }
            .header1 a{
              color:white;
              letter-spacing: 5px;
            }
            ul{
                list-style: none;
            }
            .header-left{
              width:20%;
              height:60px;
              float:left;
            }
            .header-left>a>img{
              width:25px;
              height:35px;
              margin-left:30px;
              margin-top:12px;
            }
            .header-left>a>span{
              display:inline-block;
              font-size: 15px;
              margin-left:10px;
              font-weight: 800;
              letter-spacing: 5px;
              text-align: justify;
            }
            .header-center{
              width:60%;
              text-align: center;
              float:left;
              margin-top:16px;
              
            }
            .header-center>ul>li{
              display:inline-block;
              width:20%;
              font-size: 15px;
            }
            .header-right{
              width:10%;
              float:right;
              margin-top:16px;
            }
            .header-right a{
              border-radius: 18px;
              border:2px solid white;
              padding:5px 15px;
              font-size: 14px;
              letter-spacing: 3px;
            }
            .header-center a:hover{
              text-decoration: underline;
            }
            .header-right a:hover{
              color:#31422e;
              background-color: white;
            }
                

    .login{
        width:100%;
        margin-top: 40px;
    }

    .container {
        width:35%;
        position: relative;
        left:32.5%;
        background:  rgb(244, 241, 237);
        border-radius: 20px;
        padding: 50px 60px;
        
    }

    .logo {
        text-align: center;
        margin-bottom: 40px;
    }

    .logo>img{
        width: 100px;
        height: 100px;
        margin-bottom: -40px;
    }

    .welcome h2 {
        color: #333;
        font-size: 28px;
        font-weight: 650;
        margin-bottom: 8px;
        text-align: center;
    }

    .welcome p {
        color: #666;
        font-size: 14px;
        margin-bottom: 65px;
        text-align: center;
    }

    .form-group {
        margin-bottom: 20px;
        position: relative;
    }

    .form-group input {
        width: 110%;
        padding: 18px 20px;
        border: 2px solid #e1e8ed;
        border-radius: 30px;
        font-size: 16px;
        transition: all 0.3s ease;
        background: #fff;
        display: block;
    }

    .form-group input:focus {
        outline: none;
        border-color:  #3a5236;
        box-shadow: 0 0 0 3px rgba(79, 172, 254, 0.1);
    }

    .form-group input:hover {
        border-color:  #3a5236;
    }

    .form-group input::placeholder {
        color: #bbb;
    }

    .remember {
        display: flex;
        align-items: center;
        margin-bottom: 30px;
        font-size: 14px;
        gap: 8px;
    }

    .remember input[type="checkbox"] {
        width: 16px;
        height: 16px;
        accent-color:  #3a5236;
    }

    .remember label {
        color: #555;
    }

    .login-btn {
        padding: 15px 146px;
        background: #466041;
        color: white;
        border: none;
        border-radius: 30px;
        font-size: 18px;
        font-weight: 600;
        cursor: pointer;
        transition: all 0.3s ease;
        text-decoration: none;
        margin-bottom: 20px;
        display: inline-block;
        width: 109%;
        text-align: center;
    }

    .login-btn:hover {
        box-shadow: 0 5px 15px gray;
        background-color: #3a5236;
    }

    .login-btn:active {
        transform: translateY(0);
    }

    .divider {
        text-align: center;
        margin-top: 40px;
        margin-bottom: 20px;
        position: relative;
    }

    .divider span {
        padding: 0 20px;
        color: #666;
        font-size: 14px;
    }

    .social-login {
        text-align: center;
        margin-top: 20px;
        margin-bottom: 30px;
    }

    .social-btn {
        flex: 1;
        padding: 14px;
        width:110%;
        border: 2px solid #e1e8ed;
        border-radius: 30px;
        background: white;
        color: #333;
        text-decoration: none;
        text-align: center;
        font-weight: 500;
        transition: all 0.3s ease;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 8px;
        margin-bottom: 10px;
    }

    .social-btn:hover {
        color: black;
        transform: translateY(-1px);
    }

    .kakao-btn {
        background: white;
        border-color: rgb(245, 241, 241);
        color: #000;
        padding: 13px;
    }

    .kakao-btn:hover {
        border-width: 3px;
        background: rgb(243, 243, 244);
        border-color: #fdd835;
    }

    .naver-btn {
        background: white;
        border-color: rgb(245, 241, 241);
        color: black;
    }

    .naver-btn:hover {
        border-width: 3px;
        background: rgb(243, 243, 244);
        border-color: #02b351;
    }

    .google-btn {
        border-color: rgb(245, 241, 241);
        color: black;
    }

    .google-btn:hover {
        border-width: 3px;
        background: rgb(243, 243, 244);
        border-color: rgb(066,133,244);
        color: black;
    }

    .signup-link {
        text-align: center;
        margin-top: 30px;
        padding-top: 30px;
        border-top: 1px solid #e2e8f0;
    }

    .signup-link p {
        color: #666;
        font-size: 15px;
    }

    .signup-link a {
        color:#3e4c39;
        text-decoration: none;
        font-weight: 600;
    }

    .signup-link a:hover {
        text-decoration: underline;
    }

</style>
</head>

<body>
<header>      
    <div class="header1">
      <div class="header-left"><a href="main.html"><img src="흰색로고.png"><span>COMMA<br>HOUSE</span></a></div>
      <div class="header-center">
      <ul>
        <li><a href="main.html">HOME</a></li>
        <li><a href="search.html">SEARCH</a></li>
        <li><a href="introduce.html">INTRODUCE</a></li>
        <li><a href="question.html">QUESTION</a></li>
      </ul>
      </div>
      <div class="header-right"><a href="mypage.html" class="mypage">MY PAGE</a></div>
    </div>
    <div class="header2"></div>
  </header>



 
<div class="login">

<div class="container">

<div class="logo">

<img src="로고.png">

</div>

<div class="welcome">

<h2>Log in to Comma House!</h2>

<p>여행의 특별한 순간을 만들어보세요</p>

</div>

<form action="main.html">

<div class="form-group">

<input type="text" id="username" name="username" placeholder="아이디" required>

</div>

<div class="form-group">

<input type="password" id="password" name="password" placeholder="비밀번호" required>

</div>

<div class="remember">&nbsp;

<input type="checkbox" id="remember" name="remember">

<label for="remember">로그인 정보 저장</label>

</div>


<!--<a href="main.html" class="login-btn" onclick="alert('로그인이 완료되었습니다')"></a>-->

<button type="submit" class="login-btn" >로그인 하기</button>

</form>

<div class="divider">

<span>&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;또는</span>

</div>

<div class="social-login">

<a href="https://www.kakaocorp.com/page/service/service/KakaoTalk" class="social-btn kakao-btn">

<span>🗨️</span>

카카오톡으로 시작하기

</a>

<a href="https://m.naver.com/" class="social-btn naver-btn">

<span>N</span>

네이버로 시작하기

</a>

<a href="https://www.google.co.kr/?client=safari&channel=iphone_bm" class="social-btn google-btn">

<span>G</span>

구글로 시작하기

</a>

</div>

<div class="signup-link">

<p>아직 계정이 없으신가요? <a href="회원가입.html">회원가입하기</a></p>

</div>

</div>

</div>

</body>

</html>
