<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>쉼표하우스 마이페이지 쿠폰</title>
    <style>
        *{
            margin:0;
            padding:0;

        }
        body{
        }
        a{text-decoration: none; color:black;}
        .header{
            width:100%;
            height:200px;
            background-color: white;
        }
        .header>h1{
            text-indent: 70px;
            color:#001519;
            position: absolute;
            top:120px;
            font-size: 30px;
            opacity: 0.8;
            
        }
        .header2{
            width:100%;
            height:40px;
            line-height: 40px;
            font-size:20px;
            border-bottom: 1px solid #999;
        }
        .header2>a{
            display: inline-block;
            width:150px;
            font-size: 18px;
            position:relative;
            left:20px;
        }
        .header2>a:hover{
            border-bottom: 3px solid black;
            font-weight: 600;
            z-index: 50;
        }
        .main{
            width:100%;
            height:1000px;
        }
        .main>iframe{
            width: 100%;
            height: 100%;
            padding:10px 15px;
            border:none;
        }

        .coupon{
            width:35%;
            position:relative;
            left:15%;
            top:40px;
            height:200px;
            background-color: white;
            border-radius: 20px;
            border:3px solid rgb(203, 207, 203);
        }
        .if{
            position:absolute;
            left:10%;
            top:7%;
        }
        .percent{
            font-size: 60px;
            font-weight: 600;
            position:absolute;
            top:20%;
            left:20%;
            color:#31422e;
        }
        .percent>span{
            font-size:35px;
            color:black;
            font-weight: 500;
        }
        .max{
            position:absolute;
            top:73%;
            left:10%;
            font-size: 12px;
        }
        .date{
            position:absolute;
            top:83%;
            left:10%;
            font-size: 12px;
        }


        /*<div class="if">10만원 이상 결제시</div>
                <div class="percent">10% <span>할인</span></div>
                <div class="max">최대 10만원 할인</div>
                <div class="date">사용기간 : 2025년 6월 12일까지</div>*/
    </style>
</head>
<body>
    <section>
        <div>
            <div class="header">
                <h1>쿠폰</h1>
            </div>
            <div class="header2">
                <a href="보유쿠폰.html" target="coupon">보유 쿠폰(142장)</a>
                <a href="쿠폰받기.html" target="coupon">쿠폰 받기(349장)</a>
            </div>
            <div class="main">
                <iframe src="보유쿠폰.html" name="coupon"></iframe>
            </div>
            
        </div>
    </section>
</body>
</html>
