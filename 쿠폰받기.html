<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>쉼표하우스 마이페이지 보유 쿠폰</title>
    <style>
        *{
            margin:0;
            padding:0;

        }
        
        a{color:black; text-decoration: none;}
        .coupon-box{
            width:100%;
            height:1000px;
            
        }
        .coupon-box>p{
            display: block;
            height:30px;
            
        }
        .coupon{
            width:80%;
            height:150px;
            position: relative;
            left:5%;
            border:1px solid #999;
            border-radius: 5px;
            overflow: hidden;
            margin-bottom: 10px;
            background-color: white;
        }
        .percent{
            width:95%;
            height:50px;
            border-bottom:1px solid #999;
            font-size: 25px;
            font-weight: 700;
            position: relative;
            left:2.5%;
            padding-top:10px;
        }
        .text{
           position: absolute;
           top:50%;
           left:3%;
           font-size:18px;
           font-weight: 550;
        }
        .date{
            position: absolute;
            top:75%;
            left:3%;
        }
        .match{
            position: absolute;
            bottom:5%;
            right:2%;
            text-decoration: underline;
        }
        .button{
            display: block;
            position: absolute;
            right:30px;
            top:15px;
            width:85px;
            height:30px;
            line-height: 30px;
            border-radius: 7px;
            border:1px solid #999;
            padding:0px 0px 0px 7px;
            font-size: 14px;
            
        }
        .button>img{
            width:20px;
            height:18px;
            position: relative;
            top:5px;
            
        }
        .button:hover{
            box-shadow: 1px 1px 2px #999;
        }

    </style>
</head>
<body>
    <section>
        <div class="coupon-box">
            <p>전체 349개</p>
            <div class="coupon">
                <p class="percent">20%</p>
                <a class="button" href=""><img src="다운로드.png"> 쿠폰받기</a>
                <p class="text">쉼표하우스 신규회원 첫 결제 20% 할인</p>
                <p class="date">만료 27일 전</p>
                <a class="match" href="">적용상품</a>
            </div>
            <div class="coupon">
                <p class="percent">15%</p>
                <a class="button" href=""><img src="다운로드.png"> 쿠폰받기</a>
                <p class="text">세인트 존스 호텔 조식 15% 쿠폰</p>
                <p class="date">만료 7일 전</p>
                <a class="match" href="">적용상품</a>
            </div>
            <div class="coupon">
                <p class="percent">17%</p>
                <a class="button" href=""><img src="다운로드.png"> 쿠폰받기</a>
                <p class="text">파라나스 호텔 회원 특가 17% 쿠폰</p>
                <p class="date">만료 2일 전</p>
                <a class="match" href="">적용상품</a>
            </div>
            <div class="coupon">
                <p class="percent">7%</p>
                <a class="button" href=""><img src="다운로드.png"> 쿠폰받기</a>
                <p class="text">카세로지 7주년 기념 7% 쿠폰</p>
                <p class="date">만료 26일 전</p>
                <a class="match" href="">적용상품</a>
            </div>
            <div class="coupon">
                <p class="percent">10%</p>
                <a class="button" href=""><img src="다운로드.png"> 쿠폰받기</a>
                <p class="text">그랜드 조선 연박 할인 10% 쿠폰</p>
                <p class="date">만료 29일 전</p>
                <a class="match" href="">적용상품</a>
            </div>
            <div class="coupon">
                <p class="percent">25%</p>
                <a class="button" href=""><img src="다운로드.png"> 쿠폰받기</a>
                <p class="text">DMU 호텔 오픈 이벤트 25% 쿠폰</p>
                <p class="date">만료 27일 전</p>
                <a class="match" href="">적용상품</a>
            </div>
        </div>

    </section>
</body>
</html>
