<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>COMMA HOUSE / Header</title>
  <style>
    /* Reset & 기본 스타일 */
    * {
      padding: 0;
      margin: 0;
      box-sizing: border-box;
      font-family: 'Arial', sans-serif;
    }
    html, body {
      height: 100%;
    }
    a {
      text-decoration: none;
      color: inherit;
    }

    /* 상단 헤더 */
    .header {
      width: 100%;
      position: fixed;
      height: 70px;
      background-color: #31422e;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 40px;
      top: 0;
      z-index: 1000;
      box-shadow: 0 2px 5px rgba(0,0,0,0.1);
    }
    .left .logo {
      display: flex;
      align-items: center;
    }
    .logo-img {
      width: 35px;
      height: 40px;
      margin-right: 8px;
      filter: brightness(0) invert(1);
      object-fit: contain;
    }
    .logo-text {
      font-size: 18px;
      font-weight: 600;
      letter-spacing: 2px;
      color: white;
      line-height: 1;
    }
    .right {
      font-size: 14px;
      border: 1.5px solid white;
      border-radius: 20px;
      width: 110px;
      line-height: 30px;
      text-align: center;
      letter-spacing: 2px;
      color: white;
      transition: all 0.5s;
      cursor: pointer;
    }
    .right:hover {
      background-color: white;
      color: #3a5236;
    }
      .right {
        width: 90px;
        font-size: 12px;
        line-height: 26px;
      }
  </style>
</head>
<body>
  <header>
    <div class="header">
      <div class="left">
        <a href="#" class="logo">
          <img src="흰색로고.png" alt="로고" class="logo-img" />
          <div class="logo-text">COMMA HOUSE</div>
        </a>
      </div>
      <a href="#" class="right">My Page</a>
    </div>
  </header>
</body>
</html>
