<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>쉼표하우스 마이페이지 보유 쿠폰</title>
    <style>
        *{
            margin:0;
            padding:0;

        }
        
        a{color:black;}
        .coupon-box{
            width:100%;
            height:1000px;
            
        }
        .coupon-box>p{
            display: block;
            height:30px;
            
        }
        .coupon{
            width:80%;
            height:150px;
            position: relative;
            left:5%;
            border:1px solid #999;
            border-radius: 5px;
            overflow: hidden;
            margin-bottom: 10px;
            background-color: white;
        }
        .percent{
            width:95%;
            height:50px;
            border-bottom:1px solid #999;
            font-size: 25px;
            font-weight: 700;
            position: relative;
            left:2.5%;
            padding-top:10px;
        }
        .text{
           position: absolute;
           top:50%;
           left:3%;
           font-size:18px;
           font-weight: 550;
        }
        .date{
            position: absolute;
            top:75%;
            left:3%;
        }
        .coupon>a{
            position: absolute;
            bottom:5%;
            right:2%;
        }

    </style>
</head>
<body>
    <section>
        <div class="coupon-box">
            <p>전체 141개</p>
            <div class="coupon">
                <p class="percent">15%</p>
                <p class="text">파라나스 여름 맞이 15% 특별 쿠폰</p>
                <p class="date">만료 3일 전</p>
                <a href="">적용상품</a>
            </div>
            <div class="coupon">
                <p class="percent">10%</p>
                <p class="text">그랜드 조선 5주년 쿠폰</p>
                <p class="date">오늘 만료</p>
                <a href="">적용상품</a>
            </div>
            <div class="coupon">
                <p class="percent">20%</p>
                <p class="text">세인트 존스 특별 할인 쿠폰</p>
                <p class="date">만료 5일 전</p>
                <a href="">적용상품</a>
            </div>
            <div class="coupon">
                <p class="percent">15%</p>
                <p class="text">노보텔 스위트 Late Check In 할인</p>
                <p class="date">만료 20일 전</p>
                <a href="">적용상품</a>
            </div>
            <div class="coupon">
                <p class="percent">7%</p>
                <p class="text">카세로지 호캉스 7% 할인</p>
                <p class="date">만료 15일 전</p>
                <a href="">적용상품</a>
            </div>
            <div class="coupon">
                <p class="percent">10%</p>
                <p class="text">스카이베이 고객 감사 10% 쿠폰</p>
                <p class="date">만료 4일 전</p>
                <a href="">적용상품</a>
            </div>
        </div>

    </section>
</body>
</html>
