<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>쉼표하우스 마이페이지 내 정보 관리</title>
    <style>
        *{
            margin:0;
            padding:0;
        }
        body{
            background-color: #f7f4eb;
            font-family: 'Malgun Gothic', sans-serif;
        }
        a{text-decoration: none; color:black;}
        .header{
            width:100%;
            height:200px;
            background-color: white;
            border-bottom: 2px solid #d0d8cd;
            position: relative;
        }
        .header>h1{
            text-indent: 70px;
            color:#001519;
            position: relative;
            top:120px;
            font-size: 30px;
            opacity: 0.8;
        }
        
        .main-container {
            width: 90%;
            max-width: 800px;
            margin: 50px auto;
            padding-bottom: 100px;
        }
        
        .section-header {
            background-color: white;
            padding: 30px;
            border-radius: 12px;
            margin-bottom: 30px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }
        
        .section-header h3 {
            color: #001519;
            font-size: 24px;
            margin-bottom: 10px;
        }
        
        .section-header p {
            color: #666;
            font-size: 14px;
        }
        
        .profile-section {
            background-color: white;
            border-radius: 12px;
            padding: 30px;
            margin-bottom: 20px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }
        
        .profile-header {
            display: flex;
            align-items: center;
            margin-bottom: 30px;
            padding-bottom: 20px;
            border-bottom: 1px solid #eee;
        }
        
        .profile-avatar {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            background-color: #31422e;
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 32px;
            margin-right: 20px;
        }
        
        .profile-info h4 {
            color: #001519;
            font-size: 20px;
            margin-bottom: 5px;
        }
        
        .profile-info p {
            color: #666;
            font-size: 14px;
        }
        
        .membership-badge {
            background-color: #31422e;
            color: white;
            padding: 4px 12px;
            border-radius: 15px;
            font-size: 12px;
            margin-top: 5px;
            display: inline-block;
        }
        
        .form-group {
            margin-bottom: 25px;
        }
        
        .form-group label {
            display: block;
            color: #001519;
            font-weight: 600;
            margin-bottom: 8px;
            font-size: 14px;
        }
        
        .form-group input,
        .form-group select,
        .form-group textarea {
            width: 100%;
            padding: 12px 15px;
            border: 1px solid #ddd;
            border-radius: 8px;
            font-size: 14px;
            background-color: #fafafa;
            transition: border-color 0.3s ease;
            box-sizing: border-box;
        }
        
        .form-group input:focus,
        .form-group select:focus,
        .form-group textarea:focus {
            outline: none;
            border-color: #31422e;
            background-color: white;
        }
        
        .form-row {
            display: flex;
            gap: 15px;
        }
        
        .form-row .form-group {
            flex: 1;
        }
        
        .btn-primary {
            background-color: #31422e;
            color: white;
            padding: 12px 30px;
            border: none;
            border-radius: 8px;
            font-size: 14px;
            cursor: pointer;
            transition: background-color 0.3s ease;
        }
        
        .btn-primary:hover {
            background-color: #1e2a1b;
        }
        
        .btn-secondary {
            background-color: #f8f9fa;
            color: #666;
            padding: 12px 30px;
            border: 1px solid #ddd;
            border-radius: 8px;
            font-size: 14px;
            cursor: pointer;
            margin-right: 10px;
            transition: all 0.3s ease;
        }
        
        .btn-secondary:hover {
            background-color: #e9ecef;
            border-color: #adb5bd;
        }
        
        .btn-danger {
            background-color: #dc3545;
            color: white;
            padding: 8px 20px;
            border: none;
            border-radius: 6px;
            font-size: 12px;
            cursor: pointer;
            transition: background-color 0.3s ease;
        }
        
        .btn-danger:hover {
            background-color: #c82333;
        }
        
        .section-title {
            color: #001519;
            font-size: 18px;
            margin-bottom: 20px;
            padding-bottom: 10px;
            border-bottom: 2px solid #31422e;
            display: inline-block;
        }
        
        .privacy-settings {
            background-color: #f8f9fa;
            padding: 20px;
            border-radius: 8px;
            margin-top: 20px;
        }
        
        .checkbox-group {
            display: flex;
            align-items: center;
            margin-bottom: 15px;
        }
        
        .checkbox-group input[type="checkbox"] {
            width: auto;
            margin-right: 10px;
        }
        
        .checkbox-group label {
            margin-bottom: 0;
            font-weight: normal;
            cursor: pointer;
        }
        
        .info-text {
            font-size: 12px;
            color: #666;
            margin-top: 5px;
        }
        
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 20px;
            margin-top: 20px;
        }
        
        .stat-card {
            background-color: #f8f9fa;
            padding: 20px;
            border-radius: 8px;
            text-align: center;
        }
        
        .stat-number {
            font-size: 24px;
            font-weight: bold;
            color: #31422e;
        }
        
        .stat-label {
            font-size: 12px;
            color: #666;
            margin-top: 5px;
        }
        
        @media (max-width: 600px) {
            .form-row {
                flex-direction: column;
            }
            
            .main-container {
                width: 95%;
                margin: 30px auto;
            }
            
            .profile-section {
                padding: 20px;
            }
        }
    </style>
</head>
<body>
    <section>
        <div>
            <div class="header">
                <h1>내 정보 관리</h1>
            </div>
            
            <div class="main-container">
                <div class="section-header">
                    <h3>회원 정보</h3>
                    <p>고객님의 개인정보 보호를 최우선으로 합니다.</p>
                </div>
                
                <!-- 프로필 정보 -->
                <div class="profile-section">
                    <div class="profile-header">
                        <div class="profile-avatar">김</div>
                        <div class="profile-info">
                            <h4>김쉼표</h4>
                            <p>shimpo@email.com</p>
                            <span class="membership-badge">골드 회원</span>
                        </div>
                    </div>
                    
                    <div class="stats-grid">
                        <div class="stat-card">
                            <div class="stat-number">23</div>
                            <div class="stat-label">예약 완료</div>
                        </div>
                        <div class="stat-card">
                            <div class="stat-number">15</div>
                            <div class="stat-label">후기 작성</div>
                        </div>
                        <div class="stat-card">
                            <div class="stat-number">8</div>
                            <div class="stat-label">찜한 숙소</div>
                        </div>
                        <div class="stat-card">
                            <div class="stat-number">2년</div>
                            <div class="stat-label">가입 기간</div>
                        </div>
                    </div>
                </div>
                
                <!-- 기본 정보 수정 -->
                <div class="profile-section">
                    <h3 class="section-title">기본 정보</h3>
                    
                    <form>
                        <div class="form-row">
                            <div class="form-group">
                                <label for="lastName">성</label>
                                <input type="text" id="lastName" value="김" required>
                            </div>
                            <div class="form-group">
                                <label for="firstName">이름</label>
                                <input type="text" id="firstName" value="쉼표" required>
                            </div>
                        </div>
                        
                        <div class="form-group">
                            <label for="email">이메일</label>
                            <input type="email" id="email" value="shimpo@email.com" required>
                            <div class="info-text">이메일 변경 시 인증이 필요합니다.</div>
                        </div>
                        
                        <div class="form-row">
                            <div class="form-group">
                                <label for="phone">휴대폰 번호</label>
                                <input type="tel" id="phone" value="010-1234-5678" required>
                            </div>
                            <div class="form-group">
                                <label for="birthDate">생년월일</label>
                                <input type="date" id="birthDate" value="1990-01-01">
                            </div>
                        </div>
                        
                        <div class="form-group">
                            <label for="address">주소</label>
                            <input type="text" id="address" value="서울특별시 강남구 테헤란로 123" placeholder="주소를 입력하세요">
                        </div>
                        
                        <div class="form-group">
                            <label for="bio">자기소개</label>
                            <textarea id="bio" rows="3" placeholder="간단한 자기소개를 작성해주세요">여행을 사랑하는 김쉼표입니다. 조용하고 깨끗한 숙소를 선호합니다.</textarea>
                        </div>
                        
                        <button type="button" class="btn-secondary">취소</button>
                        <button type="submit" class="btn-primary">정보 수정</button>
                    </form>
                </div>
                
                <!-- 비밀번호 변경 -->
                <div class="profile-section">
                    <h3 class="section-title">비밀번호 변경</h3>
                    
                    <form>
                        <div class="form-group">
                            <label for="currentPassword">현재 비밀번호</label>
                            <input type="password" id="currentPassword" required>
                        </div>
                        
                        <div class="form-group">
                            <label for="newPassword">새 비밀번호</label>
                            <input type="password" id="newPassword" required>
                            <div class="info-text">8자 이상, 영문/숫자/특수문자 조합</div>
                        </div>
                        
                        <div class="form-group">
                            <label for="confirmPassword">비밀번호 확인</label>
                            <input type="password" id="confirmPassword" required>
                        </div>
                        
                        <button type="submit" class="btn-primary">비밀번호 변경</button>
                    </form>
                </div>
                
                <!-- 알림 설정 -->
                <div class="profile-section">
                    <h3 class="section-title">알림 설정</h3>
                    
                    <div class="privacy-settings">
                        <div class="checkbox-group">
                            <input type="checkbox" id="emailNotification" checked>
                            <label for="emailNotification">이메일 알림 수신</label>
                        </div>
                        <div class="checkbox-group">
                            <input type="checkbox" id="smsNotification" checked>
                            <label for="smsNotification">SMS 알림 수신</label>
                        </div>
                        <div class="checkbox-group">
                            <input type="checkbox" id="pushNotification" checked>
                            <label for="pushNotification">앱 푸시 알림</label>
                        </div>
                        <div class="checkbox-group">
                            <input type="checkbox" id="marketingEmail">
                            <label for="marketingEmail">마케팅 이메일 수신</label>
                        </div>
                    </div>
                    
                    <button type="button" class="btn-primary">설정 저장</button>
                </div>
                
                <!-- 계정 관리 -->
                <div class="profile-section">
                    <h3 class="section-title">계정 관리</h3>
                    
                    <div style="border: 1px solid #dc3545; border-radius: 8px; padding: 20px; background-color: #fff5f5;">
                        <h4 style="color: #dc3545; margin-bottom: 10px;">계정 삭제</h4>
                        <p style="color: #666; font-size: 14px; margin-bottom: 15px;">
                            계정을 삭제하면 모든 예약 내역, 후기, 개인정보가 영구적으로 삭제됩니다. 
                            이 작업은 되돌릴 수 없습니다.
                        </p>
                        <button type="button" class="btn-danger">계정 삭제</button>
                    </div>
                </div>
            </div>
        </div>
    </section>
</body>
</html>
