<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>질문하기</title>
  <style>
    body {
      font-family: 'Noto Sans KR', sans-serif;
      background-color: #f9f8f5;
      margin: 0;
      padding: 60px;
      color: #1c1c1c;
    }

    .form-container {
      max-width: 600px;
      margin: 0 auto;
      background: #fff;
      padding: 40px;
      border-radius: 8px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.1);
    }

    h2 {
      margin-bottom: 30px;
      font-size: 28px;
    }

    label {
      display: block;
      margin-bottom: 8px;
      font-weight: bold;
      font-size: 14px;
    }

    input, textarea {
      width: 100%;
      padding: 12px;
      margin-bottom: 20px;
      border: 1px solid #ccc;
      border-radius: 6px;
      font-size: 14px;
      background-color: #fafafa;
    }

    textarea {
      resize: vertical;
      height: 150px;
    }

    .submit-btn {
      background-color: #1c1c1c;
      color: white;
      padding: 12px 24px;
      border: none;
      border-radius: 6px;
      font-size: 15px;
      cursor: pointer;
      text-decoration: none;
    }

    .submit-btn:hover {
      background-color: #333;
    }

    .back-link {
      display: inline-block;
      margin-top: 20px;
      font-size: 14px;
      color: #007BFF;
      text-decoration: none;
    }

    .back-link:hover {
      text-decoration: underline;
    }

    .confirmation {
      display: none;
      margin-top: 20px;
      font-size: 16px;
      color: green;
      font-weight: bold;
    }

  </style>
</head>
<body>

  <div class="form-container">
    <h2>질문하기</h2>


    <form onsubmit="event.preventDefault(); document.getElementById('show-msg').checked = true;">
      <label for="name">이름</label>
      <input type="text" id="name" name="name" required placeholder="이름을 입력하세요">

      <label for="email">이메일</label>
      <input type="email" id="email" name="email" required placeholder="이메일 주소를 입력하세요">

      <label for="question">질문 내용</label>
      <textarea id="question" name="question" required placeholder="질문을 입력하세요"></textarea>

      <a href="main.html" class="submit-btn"  onclick="alert('질문이 성공적으로 제출되었습니다. 감사합니다!')">제출하기</a>

    </form>

    <a href="question.html" class="back-link">← FAQ 페이지로 돌아가기</a>
  </div>

</body>
</html>
